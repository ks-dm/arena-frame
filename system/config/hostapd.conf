# hostapd configuration for WiFi Portal AP
# /etc/hostapd/hostapd.conf

interface=wlan0
driver=nl80211

# AP settings
ssid=ArenaFrame-Setup
hw_mode=g
channel=1
wmm_enabled=0
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0

# Security
wpa=2
wpa_passphrase=arenaframe
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
rsn_pairwise=CCMP

# Country code (change to your country)
country_code=US

# Logging
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2
