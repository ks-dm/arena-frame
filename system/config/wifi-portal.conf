# dnsmasq configuration for WiFi Portal
# /etc/dnsmasq.d/wifi-portal.conf

# Interface to listen on
interface=wlan0

# Don't use /etc/resolv.conf
no-resolv

# DHCP range
dhcp-range=192.168.4.10,192.168.4.100,255.255.255.0,24h

# Gateway
dhcp-option=3,192.168.4.1

# DNS Server
dhcp-option=6,192.168.4.1

# Redirect all DNS queries to our portal
address=/#/192.168.4.1

# Don't forward queries without domain
domain-needed

# Don't forward reverse lookups for private ranges
bogus-priv

# Bind only to specified interface
bind-interfaces

# Logging
log-queries
log-dhcp
